# Google Cloud Build configuration for Alpha Scout
# Deploy to Cloud Run with a single command:
# gcloud builds submit --config cloudbuild.yaml

steps:
  # Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/alpha-scout:$COMMIT_SHA', '.']

  # Push to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/alpha-scout:$COMMIT_SHA']

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'alpha-scout'
      - '--image'
      - 'gcr.io/$PROJECT_ID/alpha-scout:$COMMIT_SHA'
      - '--region'
      - 'europe-west1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--memory'
      - '2Gi'
      - '--cpu'
      - '2'
      - '--timeout'
      - '300'
      - '--set-env-vars'
      - 'STREAMLIT_SERVER_PORT=8080'

images:
  - 'gcr.io/$PROJECT_ID/alpha-scout:$COMMIT_SHA'

# Build timeout (10 minutes)
timeout: '600s'
